<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GALLERY // MON PROJET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #020408; --surface: #060d14;
      --c0: #00ffcc; --c1: #ff00ff; --c2: #00aaff; --c3: #ffcc00;
      --text: #c8ffe8; --muted: #3a6655;
      --mono: 'Share Tech Mono', monospace; --pixel: 'VT323', monospace;
      --glow0: 0 0 8px #00ffcc, 0 0 24px #00ffcc44;
      --glow1: 0 0 8px #ff00ff, 0 0 24px #ff00ff44;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; overflow-x: hidden; }
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px);
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(0,255,204,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,204,.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    header { padding: 3rem 2rem 2.5rem; border-bottom: 1px solid var(--c0); box-shadow: 0 1px 0 #00ffcc33, 0 2px 40px #00ffcc0a; }
    .sys-line { font-size: .7rem; color: var(--muted); letter-spacing: .12em; margin-bottom: 1.4rem; display: flex; align-items: center; gap: .6rem; }
    .sys-line::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--c0); box-shadow: var(--glow0); animation: blink 1.4s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .back-link { font-size: .72rem; letter-spacing: .1em; color: var(--muted); text-decoration: none; text-transform: uppercase; transition: color .2s; display: inline-flex; align-items: center; gap: .4rem; }
    .back-link:hover { color: var(--c0); text-shadow: var(--glow0); }
    .back-link::before { content: '◀'; font-size: .6rem; }
    h1 { font-family: var(--pixel); font-size: clamp(2.8rem, 7vw, 5.5rem); line-height: 1; letter-spacing: .06em; margin: .6rem 0 .4rem; color: var(--c0); text-shadow: var(--glow0); }
    h1 .slash { color: var(--c1); text-shadow: var(--glow1); }
    .meta { font-size: .7rem; color: var(--muted); letter-spacing: .12em; display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: .8rem; }
    .meta span { display: flex; align-items: center; gap: .4rem; }
    .meta span::before { content: '//'; color: var(--c0); opacity: .5; }
    #photo-count { color: var(--c0); }
    .filters { display: flex; flex-wrap: wrap; gap: .5rem; padding: 1.8rem 2rem; border-bottom: 1px solid #0f2a20; }
    .filter-btn { font-family: var(--mono); font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; background: transparent; border: 1px solid var(--muted); color: var(--muted); padding: .35rem .9rem; cursor: pointer; transition: all .15s; position: relative; }
    .filter-btn::before, .filter-btn::after { content: ''; position: absolute; width: 4px; height: 4px; background: currentColor; }
    .filter-btn::before { top: -2px; left: -2px; }
    .filter-btn::after  { bottom: -2px; right: -2px; }
    .filter-btn:hover { color: var(--c0); border-color: var(--c0); box-shadow: inset 0 0 12px #00ffcc0d, 0 0 8px #00ffcc22; }
    .filter-btn.active { color: #020408; background: var(--c0); border-color: var(--c0); box-shadow: var(--glow0); }
    main { padding: 2rem 1.5rem 6rem; max-width: 1400px; margin: 0 auto; }
    .grid { columns: 4 260px; column-gap: 1px; }
    .card { break-inside: avoid; margin-bottom: 1px; cursor: pointer; position: relative; overflow: hidden; background: #000; opacity: 0; transform: scale(.97); transition: opacity .4s ease, transform .4s ease; }
    .card.visible { opacity: 1; transform: scale(1); }
    .card.hidden  { display: none; }
    .card img { display: block; width: 100%; height: auto; transition: transform .5s ease, filter .4s ease; filter: saturate(.85) brightness(.9); }
    .card:hover img { transform: scale(1.06); filter: saturate(1.1) brightness(1); }
    .card::before, .card::after, .card .br::before, .card .br::after { content: ''; position: absolute; width: 14px; height: 14px; z-index: 2; opacity: 0; transition: opacity .3s; }
    .card::before  { top:0;    left:0;  border-top:2px solid var(--c0); border-left:2px solid var(--c0);   box-shadow: -2px -2px 8px var(--c0); }
    .card::after   { top:0;    right:0; border-top:2px solid var(--c1); border-right:2px solid var(--c1); box-shadow: 2px -2px 8px var(--c1); }
    .card .br::before { bottom:0; left:0;  border-bottom:2px solid var(--c2); border-left:2px solid var(--c2); box-shadow: -2px 2px 8px var(--c2); }
    .card .br::after  { bottom:0; right:0; border-bottom:2px solid var(--c3); border-right:2px solid var(--c3); box-shadow: 2px 2px 8px var(--c3); }
    .card:hover::before, .card:hover::after, .card:hover .br::before, .card:hover .br::after { opacity: 1; }
    .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 55%); opacity: 0; transition: opacity .3s; display: flex; align-items: flex-end; padding: .8rem; z-index: 1; }
    .card:hover .card-overlay { opacity: 1; }
    .card-tag { font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; color: var(--c0); text-shadow: var(--glow0); margin-bottom: .2rem; }
    .card-caption { font-family: var(--pixel); font-size: 1rem; color: #fff; letter-spacing: .05em; }
    #lightbox { position: fixed; inset: 0; background: rgba(2,4,8,.97); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
    #lightbox.open { opacity: 1; pointer-events: all; }
    #lightbox::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,255,204,.015) 3px, rgba(0,255,204,.015) 4px); pointer-events: none; z-index: 1; }
    #lb-img { max-width: 88vw; max-height: 80vh; object-fit: contain; border: 1px solid var(--c0); box-shadow: 0 0 0 1px #000, 0 0 40px #00ffcc33, 0 0 80px #00ffcc11; transition: opacity .2s; position: relative; z-index: 2; }
    .lb-info { position: fixed; bottom: 1.8rem; left: 50%; transform: translateX(-50%); text-align: center; z-index: 3; }
    #lb-caption { font-family: var(--pixel); font-size: 1.1rem; letter-spacing: .06em; color: var(--c0); text-shadow: var(--glow0); }
    #lb-counter { font-size: .65rem; letter-spacing: .15em; color: var(--muted); margin-top: .3rem; }
    .lb-btn { position: fixed; top: 50%; transform: translateY(-50%); background: transparent; border: 1px solid var(--c0); color: var(--c0); width: 44px; height: 44px; font-family: var(--mono); font-size: .9rem; cursor: pointer; transition: all .15s; z-index: 3; }
    .lb-btn:hover { background: var(--c0); color: #000; box-shadow: var(--glow0); }
    #lb-prev { left: 1.5rem; } #lb-next { right: 1.5rem; }
    #lb-close { position: fixed; top: 1.2rem; right: 1.5rem; font-family: var(--mono); font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; background: transparent; border: 1px solid var(--muted); color: var(--muted); padding: .3rem .8rem; cursor: pointer; transition: all .15s; z-index: 3; }
    #lb-close:hover { border-color: var(--c1); color: var(--c1); box-shadow: 0 0 8px #ff00ff44; }
    .empty { text-align: center; padding: 5rem 2rem; font-family: var(--pixel); font-size: 1.4rem; color: var(--muted); letter-spacing: .1em; display: none; }
    .empty.show { display: block; }
    @media (max-width: 600px) { .grid { columns: 2 150px; } .lb-btn { display: none; } h1 { font-size: 2.6rem; } }
  </style>
</head>
<body>

<header>
  <div class="sys-line">SYS:GALLERY_v1.0 &nbsp;·&nbsp; STATUS:ONLINE &nbsp;·&nbsp; <span id="ts"></span></div>
  <a class="back-link" href="https://github.com/TON-USERNAME/TON-REPO">RETURN TO REPO</a>
  <h1>GALLERY<span class="slash"> // </span>PROJECT</h1>
  <div class="meta">
    <span><span id="photo-count">0</span>&nbsp;FRAMES</span>
    <span>MODE:NEOPIXEL</span>
    <span>RES:HD</span>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" data-filter="all">[ ALL ]</button>
  <button class="filter-btn" data-filter="design">[ DESIGN ]</button>
  <button class="filter-btn" data-filter="dev">[ DEV ]</button>
  <button class="filter-btn" data-filter="demo">[ DEMO ]</button>
</div>

<main>
  <div class="grid" id="grid">

    <!-- ═══ AJOUTE TES PHOTOS ICI ═══
         src        → images/ta-photo.jpg
         data-tag   → design / dev / demo
         data-caption → légende lightbox      -->

    <div class="card" data-tag="design" data-caption="OVERVIEW // PROJECT"><div class="br"></div>
      <img src="images/photo1.jpg" alt="Photo 1" loading="lazy" />
      <div class="card-overlay"><div>
        <div class="card-tag">◈ DESIGN</div>
        <div class="card-caption">OVERVIEW</div>
      </div></div>
    </div>

    <div class="card" data-tag="dev" data-caption="ARCHITECTURE // BACKEND"><div class="br"></div>
      <img src="images/photo2.jpg" alt="Photo 2" loading="lazy" />
      <div class="card-overlay"><div>
        <div class="card-tag">◈ DEV</div>
        <div class="card-caption">ARCHITECTURE</div>
      </div></div>
    </div>

    <div class="card" data-tag="demo" data-caption="LIVE DEMO // v2.1"><div class="br"></div>
      <img src="images/photo3.jpg" alt="Photo 3" loading="lazy" />
      <div class="card-overlay"><div>
        <div class="card-tag">◈ DEMO</div>
        <div class="card-caption">LIVE DEMO</div>
      </div></div>
    </div>

    <div class="card" data-tag="design" data-caption="UI MOCKUPS // WIREFRAMES"><div class="br"></div>
      <img src="images/photo4.jpg" alt="Photo 4" loading="lazy" />
      <div class="card-overlay"><div>
        <div class="card-tag">◈ DESIGN</div>
        <div class="card-caption">UI MOCKUPS</div>
      </div></div>
    </div>

    <div class="card" data-tag="dev" data-caption="PIPELINE // CI-CD"><div class="br"></div>
      <img src="images/photo5.jpg" alt="Photo 5" loading="lazy" />
      <div class="card-overlay"><div>
        <div class="card-tag">◈ DEV</div>
        <div class="card-caption">PIPELINE</div>
      </div></div>
    </div>

    <div class="card" data-tag="demo" data-caption="FINAL RENDER // 2025"><div class="br"></div>
      <img src="images/photo6.jpg" alt="Photo 6" loading="lazy" />
      <div class="card-overlay"><div>
        <div class="card-tag">◈ DEMO</div>
        <div class="card-caption">FINAL RENDER</div>
      </div></div>
    </div>

  </div>
  <div class="empty" id="empty">// NO FRAMES IN THIS CHANNEL //</div>
</main>

<div id="lightbox">
  <button id="lb-close">[ ESC ] CLOSE</button>
  <img id="lb-img" src="" alt="" />
  <button class="lb-btn" id="lb-prev">◀</button>
  <button class="lb-btn" id="lb-next">▶</button>
  <div class="lb-info">
    <div id="lb-caption"></div>
    <div id="lb-counter"></div>
  </div>
</div>

<script>
  const cards=[...document.querySelectorAll('.card')];
  const lightbox=document.getElementById('lightbox');
  const lbImg=document.getElementById('lb-img');
  const lbCaption=document.getElementById('lb-caption');
  const lbCounter=document.getElementById('lb-counter');

  document.getElementById('photo-count').textContent=cards.length;

  function tick(){
    const d=new Date();
    document.getElementById('ts').textContent=d.toISOString().replace('T',' ').slice(0,19)+' UTC';
  }
  tick(); setInterval(tick,1000);

  const io=new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){setTimeout(()=>e.target.classList.add('visible'),i*55);io.unobserve(e.target);}
    });
  },{threshold:.08});
  cards.forEach(c=>io.observe(c));

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const f=btn.dataset.filter;
      cards.forEach(c=>c.classList.toggle('hidden',f!=='all'&&c.dataset.tag!==f));
      document.getElementById('empty').classList.toggle('show',cards.every(c=>c.classList.contains('hidden')));
    });
  });

  let visible=[],cur=0;
  function open(i){visible=cards.filter(c=>!c.classList.contains('hidden'));cur=i;show(cur);lightbox.classList.add('open');document.body.style.overflow='hidden';}
  function show(i){lbImg.style.opacity='0';setTimeout(()=>{lbImg.src=visible[i].querySelector('img').src;lbImg.style.opacity='1';},180);lbCaption.textContent=visible[i].dataset.caption||'';lbCounter.textContent='FRAME_'+String(i+1).padStart(3,'0')+' / '+String(visible.length).padStart(3,'0');}
  function close(){lightbox.classList.remove('open');document.body.style.overflow='';}

  cards.forEach(c=>c.addEventListener('click',()=>{const vis=cards.filter(x=>!x.classList.contains('hidden'));open(vis.indexOf(c));}));
  document.getElementById('lb-close').addEventListener('click',close);
  document.getElementById('lb-prev').addEventListener('click',()=>{cur=(cur-1+visible.length)%visible.length;show(cur);});
  document.getElementById('lb-next').addEventListener('click',()=>{cur=(cur+1)%visible.length;show(cur);});
  lightbox.addEventListener('click',e=>{if(e.target===lightbox)close();});
  document.addEventListener('keydown',e=>{
    if(!lightbox.classList.contains('open'))return;
    if(e.key==='Escape')close();
    if(e.key==='ArrowLeft'){cur=(cur-1+visible.length)%visible.length;show(cur);}
    if(e.key==='ArrowRight'){cur=(cur+1)%visible.length;show(cur);}
  });
</script>
</body>
</html>
