<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thats my website!</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:       #55bbff;
    --blue-dim:   #1a4d7a;
    --blue-faint: rgba(85, 187, 255, 0.06);
    --bg:         #010408;
    --scanline-h: 3px;
  }

  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

  #shell {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }

  #screen {
    position: relative;
    width: min(98vw, 1200px);
    height: min(96vh, 750px);
    background: var(--bg);
    border-radius: 28px / 22px;
    overflow: hidden;
    filter: url(#crt-barrel);
    box-shadow:
      0 0 0 1px #0a0d14,
      0 0 0 3px #050810,
      0 0 50px 6px rgba(20, 50, 110, 0.85),
      inset 0 0 80px 20px rgba(0,0,0,0.6);
  }

  /* scanlines */
  #screen::before {
    content: ''; position: absolute; inset: 0;
    z-index: 20; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent calc(var(--scanline-h) - 1px),
      rgba(0,0,0,0.38) calc(var(--scanline-h) - 1px),
      rgba(0,0,0,0.38) var(--scanline-h)
    );
  }

  /* vignette */
  #screen::after {
    content: ''; position: absolute; inset: 0;
    z-index: 21; pointer-events: none;
    background: radial-gradient(
      ellipse 90% 85% at 50% 50%,
      transparent 50%,
      rgba(0,0,8,0.5) 78%,
      rgba(0,0,8,0.94) 100%
    );
  }

  /* slow beam */
  #crt-beam {
    position: absolute; left: 0; right: 0; height: 14%;
    z-index: 15; pointer-events: none;
    background: linear-gradient(
      to bottom,
      transparent 0%, rgba(85,187,255,0.018) 30%,
      rgba(85,187,255,0.042) 50%, rgba(85,187,255,0.018) 70%, transparent 100%
    );
    animation: beam-roll 5000ms linear infinite;
  }
  @keyframes beam-roll { from { top: -15%; } to { top: 105%; } }

  /* 60hz refresh blink */
  #crt-refresh {
    position: absolute; inset: 0;
    z-index: 14; pointer-events: none;
    background: #000;
    animation: refresh60 16ms steps(1) infinite;
  }
  @keyframes refresh60 {
    0%  { opacity: 0.13; }
    50% { opacity: 0; }
  }

  #content {
    position: relative; z-index: 16;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 48px 72px 40px;
    color: var(--blue);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  .glow {
    text-shadow: 0 0 6px var(--blue), 0 0 16px rgba(85,187,255,0.45), 0 0 32px rgba(85,187,255,0.18);
  }

  /* TOP BAR */
  #topbar {
    display: flex; justify-content: space-between; align-items: flex-start;
    border-bottom: 1px solid var(--blue-dim);
    padding-bottom: 16px; flex-shrink: 0;
  }
  #logo { font-family: 'VT323', monospace; font-size: 48px; letter-spacing: 0.18em; line-height: 1; }
  #tagline {
    font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--blue-dim); margin-top: 5px;
    text-shadow: 0 0 8px rgba(85,187,255,0.2);
  }
  #clock-block { text-align: right; font-size: 11px; letter-spacing: 0.15em; color: var(--blue-dim); line-height: 1.7; }
  #clock {
    font-family: 'VT323', monospace; font-size: 26px;
    letter-spacing: 0.1em; color: var(--blue); display: block;
    text-shadow: 0 0 8px rgba(85,187,255,0.4);
  }

  nav {
    flex-shrink: 0; margin-top: 20px;
    border-bottom: 1px solid var(--blue-dim); padding-bottom: 0;
  }
  nav a {
    display: inline-block; text-decoration: none; color: var(--blue);
    font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
    padding: 8px 0; border-bottom: 1px solid var(--blue);
    margin-bottom: -1px; text-shadow: 0 0 8px rgba(85,187,255,0.5);
  }

  /* ── GALLERY AREA ── */
  #gallery {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-top: 20px;
    overflow: hidden;
  }

  /* row: arrow — image — arrow */
  #viewer {
    display: flex;
    align-items: center;
    gap: 28px;
    width: 100%;
    justify-content: center;
  }

  /* ── ARROW BUTTONS ──
     To change arrow style, just edit the text inside the <button> in the HTML.
     They inherit all CRT styling automatically.                               */
  .arrow {
    font-family: 'VT323', monospace;
    font-size: 48px;
    line-height: 1;
    color: var(--blue-dim);
    background: none;
    border: 1px solid var(--blue-dim);
    padding: 8px 18px 4px;
    cursor: pointer;
    flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
    text-shadow: none;
    user-select: none;
  }
  .arrow:hover {
    color: var(--blue);
    border-color: var(--blue);
    background: var(--blue-faint);
    text-shadow: 0 0 10px var(--blue);
    box-shadow: 0 0 14px rgba(85,187,255,0.15), inset 0 0 8px rgba(85,187,255,0.06);
  }
  .arrow:active {
    background: rgba(85,187,255,0.12);
  }

  /* ── PICTURE FRAME ──
     Images are rendered with pixelation to keep the lo-fi look.
     Click on the image opens it in a new tab (set in JS below). */
  #pic-frame {
    position: relative;
    width: 480px;
    height: 340px;
    border: 1px solid var(--blue-dim);
    box-shadow: 0 0 0 1px rgba(85,187,255,0.06), 0 0 20px rgba(85,187,255,0.08);
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
    background: #000;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #pic-frame:hover {
    border-color: var(--blue);
    box-shadow: 0 0 0 1px rgba(85,187,255,0.2), 0 0 28px rgba(85,187,255,0.18);
  }

  #pic-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    /* pixelation / low-res feel */
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    filter: contrast(1.05) saturate(0.85) brightness(0.92);
  }

  /* placeholder shown when no image src is set */
  #pic-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    color: var(--blue-dim);
    font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
  }
  #pic-placeholder .ph-icon {
    font-family: 'VT323', monospace;
    font-size: 52px; line-height: 1;
    color: var(--blue-dim);
    opacity: 0.4;
  }

  /* hover hint overlay */
  #pic-frame .click-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(1,4,8,0.55);
    color: var(--blue);
    font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
    text-shadow: 0 0 8px var(--blue);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  #pic-frame:hover .click-hint { opacity: 1; }

  /* ── CAPTION ── */
  #caption-wrap {
    width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* counter e.g. "02 / 05" */
  #pic-counter {
    font-size: 9px; letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--blue-dim);
    text-shadow: 0 0 6px rgba(85,187,255,0.15);
  }

  /* the actual caption text — edit per-slide in the JS slides array */
  #caption {
    font-size: 11px; letter-spacing: 0.12em;
    color: var(--blue-dim); text-align: center;
    min-height: 1.6em;
    text-shadow: 0 0 5px rgba(85,187,255,0.2);
    transition: opacity 0.15s;
  }

  /* STATUS BAR */
  #statusbar {
    flex-shrink: 0; margin-top: auto; padding-top: 16px;
    border-top: 1px solid var(--blue-dim);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(85,187,255,0.3);
  }
  #statusbar .dot {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--blue); margin-right: 8px;
    box-shadow: 0 0 6px var(--blue);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .cursor {
    display: inline-block; width: 0.65em; height: 0.9em;
    background: var(--blue); vertical-align: text-bottom; margin-left: 3px;
    animation: blink 1.05s step-end infinite;
    box-shadow: 0 0 6px var(--blue), 0 0 12px rgba(85,187,255,0.4);
  }

  #noise {
    position: absolute; inset: 0; z-index: 9; pointer-events: none;
    opacity: 0.03; mix-blend-mode: screen;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <filter id="crt-barrel" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0018 0.0018" numOctaves="1" seed="2" result="warp"/>
      <feDisplacementMap in="SourceGraphic" in2="warp" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div id="shell">
  <div id="screen">
    <div id="noise"></div>
    <div id="crt-beam"></div>
    <div id="crt-refresh"></div>

    <div id="content">

      <div id="topbar">
        <div>
          <div id="logo" class="glow">Welcome!</div>
          <div id="tagline">Snow Sensor nigger gallery nigga nigga</div>
        </div>
        <div id="clock-block">
          <span id="clock">--:--:--</span>
          <span>TERMINAL SESSION ACTIVE</span>
          <span id="date-display">--/--/----</span>
        </div>
      </div>

      <nav><a>Gallery</a></nav>

      <!-- GALLERY -->
      <div id="gallery">
        <div id="viewer">

          <!-- LEFT ARROW — change ◄ to anything you want -->
          <button class="arrow" id="btn-prev">◄</button>

          <!-- PICTURE FRAME — click opens the image link -->
          <div id="pic-frame">
            <img id="pic-img" src="" alt="">
            <div id="pic-placeholder">
              <div class="ph-icon">[ ]</div>
              <span>No image loaded</span>
            </div>
            <div class="click-hint">[ open ]</div>
          </div>

          <!-- RIGHT ARROW -->
          <button class="arrow" id="btn-next">►</button>

        </div>

        <!-- CAPTION AREA -->
        <div id="caption-wrap">
          <div id="pic-counter">-- / --</div>
          <div id="caption">—</div>
        </div>
      </div>

      <div id="statusbar">
        <span><span class="dot"></span>SYSTEM NOMINAL</span>
        <span>GUEST · <span id="yr">----</span></span>
        <span>SESSION <span id="sess-id">----</span><span class="cursor"></span></span>
      </div>

    </div>
  </div>
</div>

<script>
  // ════════════════════════════════════════════════════════
  //  SLIDES — add or remove objects in this array.
  //
  //  src     : path or URL to your image file
  //            e.g. "photos/my-car.jpg"  or  "https://i.imgur.com/xxxx.jpg"
  //  caption : text shown below the picture
  //  link    : URL that opens when you click the picture
  //            set to "" or null to make it non-clickable
  // ════════════════════════════════════════════════════════
  const slides = [
    {
      src:     "https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Empire_State_Building_%28aerial_view%29.jpg/800px-Empire_State_Building_%28aerial_view%29.jpg",
      caption: "Replace this with your own photo caption",
      link:    "https://en.wikipedia.org/wiki/Empire_State_Building"
    },
    {
      src:     "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/280px-PNG_transparency_demonstration_1.png",
      caption: "Another caption goes here",
      link:    ""
    },
    {
      src:     "",   // ← leave src empty to show placeholder
      caption: "Add your image path in the slides array",
      link:    ""
    }
  ];
  // ════════════════════════════════════════════════════════

  let current = 0;

  const img         = document.getElementById('pic-img');
  const placeholder = document.getElementById('pic-placeholder');
  const caption     = document.getElementById('caption');
  const counter     = document.getElementById('pic-counter');
  const frame       = document.getElementById('pic-frame');

  function pad2(n){ return String(n).padStart(2,'0'); }

  function show(index) {
    const s = slides[index];

    // image
    if (s.src) {
      img.src = s.src;
      img.style.display = 'block';
      placeholder.style.display = 'none';
    } else {
      img.src = '';
      img.style.display = 'none';
      placeholder.style.display = 'flex';
    }

    // caption flash
    caption.style.opacity = '0';
    setTimeout(() => {
      caption.textContent = s.caption || '—';
      caption.style.opacity = '1';
    }, 80);

    // counter
    counter.textContent = pad2(index + 1) + ' / ' + pad2(slides.length);

    // click handler
    frame.onclick = () => {
      if (s.link) window.open(s.link, '_blank');
    };
    frame.style.cursor = s.link ? 'pointer' : 'default';
  }

  document.getElementById('btn-prev').onclick = () => {
    current = (current - 1 + slides.length) % slides.length;
    show(current);
  };
  document.getElementById('btn-next').onclick = () => {
    current = (current + 1) % slides.length;
    show(current);
  };

  // keyboard arrows
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { current = (current - 1 + slides.length) % slides.length; show(current); }
    if (e.key === 'ArrowRight') { current = (current + 1) % slides.length; show(current); }
  });

  show(current);

  // clock
  function tick(){
    const d = new Date();
    document.getElementById('clock').textContent = pad2(d.getHours())+':'+pad2(d.getMinutes())+':'+pad2(d.getSeconds());
    document.getElementById('date-display').textContent = pad2(d.getDate())+'/'+pad2(d.getMonth()+1)+'/'+d.getFullYear();
    document.getElementById('yr').textContent = d.getFullYear();
  }
  tick(); setInterval(tick,1000);
  document.getElementById('sess-id').textContent = Math.random().toString(36).substring(2,8).toUpperCase();
</script>
</body>
</html>
